# ProGuard 配置文件 - 用于代码混淆和压缩
# 减小 JAR 文件体积，提高安全性

# 输入/输出
-injars bin/LegendsNeverDie.jar
-outjars bin/LegendsNeverDie-obf.jar

# 不压缩入口类
-keep public class Start {
    public static void main(java.lang.String[]);
}

# 保留所有主类方法（因为使用反射调用）
-keepclassmembers public class Start {
    public void action();
    public void startGame();
    public void pauseGame();
    public void resumeGame();
    public void jumpOrFly();
    public void attack();
    public void fireMissile();
}

# 保留 Swing 组件（GUI 相关）
-keep public class * extends javax.swing.JPanel
-keep public class * extends javax.swing.JFrame

# 保留游戏对象类
-keep public class Hero
-keep public class Enemy
-keep public class Boss
-keep public class Bullet
-keep public class Missile
-keep public class BossMissile
-keep public class Obstacle
-keep public class MovableObject
-keep public class NPC
-keep public class AudioManager

# 保留类成员（避免游戏逻辑被破坏）
-keepclassmembers public class * {
    public void move();
    public void getExp();
    public void setHitEffect();
    public void jump();
    public void addLife();
    public void equipMissile();
    public void getShield();
    public void fireUpCount();
    public void increaseSpeedAndFly();
}

# 保留字段（游戏状态）
-keepclassmembers public class Start {
    public static int speed;
    public static int lastSpeed;
    public static java.awt.image.BufferedImage *;
}

-keepclassmembers public class Hero {
    public int missile;
    public boolean isHit;
    public int fireUpCount;
    public int shield;
    public int level;
    public int fireLevel;
    public int expRequire;
    public boolean isJumping;
    public boolean ableToFly;
    public boolean isFlying;
    public int life;
    public int exp;
}

-keepclassmembers public class MovableObject {
    protected int x;
    protected int y;
    protected int width;
    protected int height;
    protected java.awt.image.BufferedImage image;
    protected java.awt.image.BufferedImage[] images;
    protected int exp;
    protected int life;
}

# 保留音频管理器
-keep public class AudioManager {
    public static AudioManager getInstance();
    public void init();
    public void playSound(java.lang.String);
    public void playJumpSound();
    public void playShootSound();
    public void playMissileSound();
    public void playHitSound();
    public void playEnemyAppearSound();
    public void playBossAppearSound();
    public void playGameOverSound();
    public void playBackgroundMusic();
    public void stopBackgroundMusic();
    public void pauseBackgroundMusic();
    public void resumeBackgroundMusic();
}

# 优化选项
-optimizationpasses 5
-dontusemixedcaseclassnames
-dontskipnonpubliclibraryclasses
-dontpreverify
-verbose
-optimizations !code/simplification/arithmetic,!field/*,!class/merging/*

# 保留异常信息
-keepattributes *Annotation*
-keepattributes Signature
-keepattributes Exceptions
-keepattributes InnerClasses
-keepattributes EnclosingMethod

# 保留行号信息（便于调试）
-keepattributes SourceFile,LineNumberTable

# 压缩
-dontshrink

# 优化
-dontoptimize

# 混淆
-dontobfuscate
